<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4db5ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4db5ff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <g fill="#4db5ff" opacity="0.06">
    <circle cx="30" cy="30" r="1.5"/><circle cx="70" cy="30" r="1.5"/><circle cx="110" cy="30" r="1.5"/><circle cx="150" cy="30" r="1.5"/><circle cx="190" cy="30" r="1.5"/><circle cx="230" cy="30" r="1.5"/><circle cx="270" cy="30" r="1.5"/><circle cx="310" cy="30" r="1.5"/><circle cx="350" cy="30" r="1.5"/><circle cx="390" cy="30" r="1.5"/><circle cx="430" cy="30" r="1.5"/><circle cx="470" cy="30" r="1.5"/><circle cx="510" cy="30" r="1.5"/><circle cx="550" cy="30" r="1.5"/>
    <circle cx="30" cy="70" r="1.5"/><circle cx="70" cy="70" r="1.5"/><circle cx="110" cy="70" r="1.5"/><circle cx="150" cy="70" r="1.5"/><circle cx="190" cy="70" r="1.5"/><circle cx="230" cy="70" r="1.5"/><circle cx="270" cy="70" r="1.5"/><circle cx="310" cy="70" r="1.5"/><circle cx="350" cy="70" r="1.5"/><circle cx="390" cy="70" r="1.5"/><circle cx="430" cy="70" r="1.5"/><circle cx="470" cy="70" r="1.5"/><circle cx="510" cy="70" r="1.5"/><circle cx="550" cy="70" r="1.5"/>
    <circle cx="30" cy="110" r="1.5"/><circle cx="70" cy="110" r="1.5"/><circle cx="110" cy="110" r="1.5"/><circle cx="150" cy="110" r="1.5"/><circle cx="190" cy="110" r="1.5"/><circle cx="230" cy="110" r="1.5"/><circle cx="270" cy="110" r="1.5"/><circle cx="310" cy="110" r="1.5"/><circle cx="350" cy="110" r="1.5"/><circle cx="390" cy="110" r="1.5"/><circle cx="430" cy="110" r="1.5"/><circle cx="470" cy="110" r="1.5"/><circle cx="510" cy="110" r="1.5"/><circle cx="550" cy="110" r="1.5"/>
    <circle cx="30" cy="150" r="1.5"/><circle cx="70" cy="150" r="1.5"/><circle cx="110" cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/><circle cx="190" cy="150" r="1.5"/><circle cx="230" cy="150" r="1.5"/><circle cx="270" cy="150" r="1.5"/><circle cx="310" cy="150" r="1.5"/><circle cx="350" cy="150" r="1.5"/><circle cx="390" cy="150" r="1.5"/><circle cx="430" cy="150" r="1.5"/><circle cx="470" cy="150" r="1.5"/><circle cx="510" cy="150" r="1.5"/><circle cx="550" cy="150" r="1.5"/>
    <circle cx="30" cy="190" r="1.5"/><circle cx="70" cy="190" r="1.5"/><circle cx="110" cy="190" r="1.5"/><circle cx="150" cy="190" r="1.5"/><circle cx="190" cy="190" r="1.5"/><circle cx="230" cy="190" r="1.5"/><circle cx="270" cy="190" r="1.5"/><circle cx="310" cy="190" r="1.5"/><circle cx="350" cy="190" r="1.5"/><circle cx="390" cy="190" r="1.5"/><circle cx="430" cy="190" r="1.5"/><circle cx="470" cy="190" r="1.5"/><circle cx="510" cy="190" r="1.5"/><circle cx="550" cy="190" r="1.5"/>
  </g>

  <!-- Credit card icon -->
  <g transform="translate(210, 110)">
    <!-- Card body -->
    <rect x="0" y="0" width="180" height="115" rx="14" fill="url(#cardGrad)" stroke="#4db5ff" stroke-width="1.5" opacity="0.9"/>

    <!-- Magnetic stripe -->
    <rect x="0" y="28" width="180" height="22" fill="#4db5ff" opacity="0.18" rx="0"/>

    <!-- Chip -->
    <rect x="22" y="52" width="32" height="24" rx="4" fill="#4db5ff" opacity="0.35" stroke="#4db5ff" stroke-width="0.8"/>
    <line x1="30" y1="52" x2="30" y2="76" stroke="#4db5ff" stroke-width="0.5" opacity="0.4"/>
    <line x1="38" y1="52" x2="38" y2="76" stroke="#4db5ff" stroke-width="0.5" opacity="0.4"/>
    <line x1="46" y1="52" x2="46" y2="76" stroke="#4db5ff" stroke-width="0.5" opacity="0.4"/>
    <line x1="22" y1="64" x2="54" y2="64" stroke="#4db5ff" stroke-width="0.5" opacity="0.4"/>

    <!-- Card number dots -->
    <g fill="#ffffff" opacity="0.5">
      <circle cx="24" cy="90" r="2.5"/><circle cx="33" cy="90" r="2.5"/><circle cx="42" cy="90" r="2.5"/><circle cx="51" cy="90" r="2.5"/>
      <circle cx="70" cy="90" r="2.5"/><circle cx="79" cy="90" r="2.5"/><circle cx="88" cy="90" r="2.5"/><circle cx="97" cy="90" r="2.5"/>
      <circle cx="116" cy="90" r="2.5"/><circle cx="125" cy="90" r="2.5"/><circle cx="134" cy="90" r="2.5"/><circle cx="143" cy="90" r="2.5"/>
    </g>
    <text x="160" y="94" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.5" text-anchor="end">3456</text>

    <!-- Contactless icon -->
    <g transform="translate(150, 55)" stroke="#4db5ff" stroke-width="1.2" fill="none" opacity="0.4">
      <path d="M0,8 Q4,4 4,0"/>
      <path d="M0,12 Q8,6 8,0"/>
      <path d="M0,16 Q12,8 12,0"/>
    </g>
  </g>

  <!-- Decorative accent line -->
  <line x1="200" y1="260" x2="400" y2="260" stroke="#4db5ff" stroke-width="1" opacity="0.3"/>

  <!-- Title text -->
  <text x="300" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Payment Platform</text>

  <!-- Subtitle -->
  <text x="300" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4db5ff" text-anchor="middle" opacity="0.7" letter-spacing="2">SECURE TRANSACTIONS</text>

  <!-- Corner accents -->
  <path d="M12,2 L2,2 L2,12" fill="none" stroke="#4db5ff" stroke-width="1.5" opacity="0.3"/>
  <path d="M588,2 L598,2 L598,12" fill="none" stroke="#4db5ff" stroke-width="1.5" opacity="0.3"/>
  <path d="M2,388 L2,398 L12,398" fill="none" stroke="#4db5ff" stroke-width="1.5" opacity="0.3"/>
  <path d="M598,388 L598,398 L588,398" fill="none" stroke="#4db5ff" stroke-width="1.5" opacity="0.3"/>
</svg>